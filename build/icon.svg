<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a2e1a"/>
      <stop offset="100%" stop-color="#0a1a0a"/>
    </linearGradient>
    <linearGradient id="green" x1="200" y1="260" x2="560" y2="764" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#86efac"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background: dark forest green — full square, macOS applies rounding -->
  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- Subtle inner border -->
  <rect width="1024" height="1024" fill="none" stroke="rgba(134,239,172,0.08)" stroke-width="2"/>

  <!-- Terminal prompt chevron > with glow -->
  <polyline
    points="220,250 560,512 220,774"
    fill="none"
    stroke="url(#green)"
    stroke-width="96"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#glow)"
  />

  <!-- Blinking cursor block -->
  <rect x="620" y="435" width="184" height="130" fill="url(#green)" rx="16" filter="url(#glow)"/>
</svg>
